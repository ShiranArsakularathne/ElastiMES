<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MES System - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div style="text-align: center; margin-bottom: 20px;">
                <i class="fas fa-industry" style="font-size: 3rem; color: #3498db;"></i>
            </div>
            <h1>MES System</h1>
            <p style="text-align: center; color: #666; margin-bottom: 30px;">Manufacturing Execution System for Elastic Manufacturer</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                </div>
                
                <div class="login-actions">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                    
                    <div style="text-align: center; margin: 15px 0; color: #999;">OR</div>
                    
                    <button type="button" id="rfidLoginBtn" class="btn btn-secondary" style="width: 100%;">
                        <i class="fas fa-id-card"></i> RFID Login
                    </button>
                </div>
            </form>
            
            <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; text-align: center;">
                <p style="color: #777; font-size: 0.9rem;">
                    <i class="fas fa-info-circle"></i> 
                    For RFID login, scan your RFID card when prompted.
                </p>
                <p style="color: #777; font-size: 0.9rem; margin-top: 10px;">
                    <i class="fas fa-hardware"></i> 
                    Ensure RFID reader and barcode scanners are connected.
                </p>
            </div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
